services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: icpd_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d icpd_bot"]
      interval: 5s
      timeout: 5s
      retries: 20

  bot:
    image: icpd-bot:local
    build: .
    env_file:
      - .env
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    image: icpd-bot:local
    build: .
    env_file:
      - .env
    working_dir: /app
    volumes:
      - .:/app
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  test:
    image: icpd-bot:local
    build: .
    env_file:
      - .env
    working_dir: /app
    volumes:
      - .:/app
    command: ["pytest"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
